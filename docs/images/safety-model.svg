<svg width="1200" height="460" viewBox="0 0 1200 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Safety model</title>
  <desc id="desc">A conservative safety model with read-only scanning, protected paths, dry-run logs, and explicit confirmation.</desc>
  <rect width="1200" height="460" rx="18" fill="#F5F7FB"/>
  <rect x="38" y="38" width="1124" height="384" rx="16" fill="white" stroke="#D9E0EA"/>
  <text x="70" y="88" fill="#182230" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="700">Safety Model</text>
  <text x="70" y="119" fill="#667085" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16">Risky actions are blocked by default and require visible user intent.</text>

  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="78" y="166" width="248" height="172" rx="14" fill="#EEF4FF" stroke="#B2CCFF"/>
    <circle cx="116" cy="208" r="18" fill="#2563EB"/>
    <text x="110" y="215" fill="white" font-size="18" font-weight="700">1</text>
    <text x="146" y="205" fill="#1D4ED8" font-size="20" font-weight="700">Read-only scan</text>
    <text x="108" y="250" fill="#344054" font-size="15">Collect sizes, paths, tags,</text>
    <text x="108" y="274" fill="#344054" font-size="15">and recommendations.</text>

    <rect x="356" y="166" width="248" height="172" rx="14" fill="#F0FDF4" stroke="#BBF7D0"/>
    <circle cx="394" cy="208" r="18" fill="#059669"/>
    <text x="388" y="215" fill="white" font-size="18" font-weight="700">2</text>
    <text x="424" y="205" fill="#047857" font-size="20" font-weight="700">Protected paths</text>
    <text x="386" y="250" fill="#344054" font-size="15">Block system roots and</text>
    <text x="386" y="274" fill="#344054" font-size="15">symlinks into them.</text>

    <rect x="634" y="166" width="248" height="172" rx="14" fill="#FFF7ED" stroke="#FED7AA"/>
    <circle cx="672" cy="208" r="18" fill="#F97316"/>
    <text x="666" y="215" fill="white" font-size="18" font-weight="700">3</text>
    <text x="702" y="205" fill="#C2410C" font-size="20" font-weight="700">Dry-run first</text>
    <text x="664" y="250" fill="#344054" font-size="15">Write a cleanup plan log</text>
    <text x="664" y="274" fill="#344054" font-size="15">before deleting files.</text>

    <rect x="912" y="166" width="210" height="172" rx="14" fill="#FDF2F8" stroke="#FBCFE8"/>
    <circle cx="950" cy="208" r="18" fill="#DB2777"/>
    <text x="944" y="215" fill="white" font-size="18" font-weight="700">4</text>
    <text x="980" y="205" fill="#BE185D" font-size="20" font-weight="700">Confirm</text>
    <text x="942" y="250" fill="#344054" font-size="15">Deletion requires an</text>
    <text x="942" y="274" fill="#344054" font-size="15">explicit token.</text>

    <rect x="350" y="365" width="500" height="34" rx="17" fill="#F8FAFC" stroke="#D9E0EA"/>
    <text x="422" y="388" fill="#475467" font-size="15">No silent cleanup. No system paths. No delete without confirmation.</text>
  </g>
</svg>
